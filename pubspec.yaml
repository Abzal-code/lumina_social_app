name: lumina
description: "A Flutter client for the JSONPlaceholder API: posts, users, comments, and local favorites."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.10.0
  flutter_riverpod: ^3.1.0
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  json_annotation: ^4.9.0
  riverpod_annotation: ^4.0.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.15.1
  custom_lint: ^0.8.1
  flutter_lints: ^6.0.0
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  mocktail: ^1.0.5
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.1.0

flutter:
  uses-material-design: true
